services:
  backend:
    build:
      context: ./backend
      dockerfile: server/Dockerfile
    container_name: news_summarizer_backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/server/.env
    volumes:
      - news_summarizer_data:/app/database/data

  backend_cron:
    build:
      context: ./backend
      dockerfile: workers/Dockerfile
    container_name: news_summarizer_backend_cron
    env_file:
      - ./backend/workers/.env
    depends_on:
      - backend
    volumes:
      - news_summarizer_data:/app/database/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: news_summarizer_frontend
    ports:
      - "3001:3000"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend

volumes:
  news_summarizer_data:
