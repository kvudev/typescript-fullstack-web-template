services:
  db:
    image: postgres:16-alpine
    container_name: news_summarizer_db
    env_file:
      - ./backend/database/.env
    ports:
      - "5432:5432"
    volumes:
      - news_summarizer_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: server/Dockerfile
    container_name: news_summarizer_backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/server/.env
    command: sh -c "cd /app/database && npx prisma db push --schema prisma/schema.prisma && cd /app/server && npm run start:server"
    depends_on:
      db:
        condition: service_healthy

  backend_cron:
    build:
      context: ./backend
      dockerfile: workers/Dockerfile
    container_name: news_summarizer_backend_cron
    env_file:
      - ./backend/workers/.env
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    command: sh -c "cd /app/database && npx prisma db push --schema prisma/schema.prisma && cd /app/workers && npm run start:cron"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: news_summarizer_frontend
    ports:
      - "3001:3000"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend

volumes:
  news_summarizer_pg_data:
