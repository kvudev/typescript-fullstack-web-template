version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: news_summarizer
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  db-migrate:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
      target: builder
    command: sh -c "pnpm --filter @news-summarizer/db db:migrate:deploy"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/news_summarizer?schema=public
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/news_summarizer?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      API_PORT: 3001
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/news_summarizer?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      WORKER_CONCURRENCY: 5
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
    depends_on:
      - api

volumes:
  postgres_data:
